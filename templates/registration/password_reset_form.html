{% extends "base.html" %}

{% block title %}<title>Forgot Your Password?</title>{% endblock title %}

{% block content %}

<div class="card bg-dark text-light mt-4 p-4 rounded-4 shadow-lg">

    <div class="border-bottom border-secondary pb-3 mb-4">
        <h2 class="m-0">Reset password</h2>
    </div>

    <p class="text-muted mb-4">
        Enter the email address linked to your account.
        We’ll send you a password reset link.
    </p>

    <form method="post">
        {% csrf_token %}

        <div class="row g-3">

            <div class="col-12">
                <label class="d-block form-label text-muted">E-mail</label>
                {{ form.email }}
            </div>

        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
            <a href="{% url 'login' %}" class="btn btn-danger px-4">
                Cancel
            </a>

            <button type="submit" class="btn btn-success px-4">
                Send link
            </button>
        </div>

    </form>

</div>

{% endblock content %}

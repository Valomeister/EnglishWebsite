{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block title %}{% endblock title %}
</head>
<body>
    <nav class="navbar navbar-expand navbar-dark bg-dark position-sticky">
        <div class="container">
            <a href="/" class="navbar-brand">Home</a>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a href="/decks/" class="nav-link">My Decks</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Library</a>
                </li>
                <li class="nav-item">
                    <a href="/admin/" class="nav-link">Admin (tmp)</a>
                </li>
                <li class="nav-item">
                    {% if user.is_authenticated %}
                        <a href="{% url 'account' user.pk %}" class="nav-link">{{ user.username }}</a>
                    {% else %}
                        <a href="{% url 'login' %}" class="nav-link">Log in</a>
                    {% endif %}
                </li>
            </ul>
        </div>
    </nav>
    <main class=" text-light">
        <div class="container">
            {% block content %}
            {% endblock content %}
        </div>

    </main>

    <script src="{% static 'js/bootstrap.min.js' %}"></script>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
